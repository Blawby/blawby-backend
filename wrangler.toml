name = "blawby-backend"
main = "worker.js"
compatibility_date = "2025-04-01"

[[containers]]
class_name = "BackendContainer"
image = "./Dockerfile"
max_instances = 1
instance_type = "basic"

[containers.ssh]
enabled = false

[vars]
ENABLE_QUEUE = "true"

[[durable_objects.bindings]]
name = "BACKEND"
class_name = "BackendContainer"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["BackendContainer"]

[[hyperdrive]]
binding = "HYPERDRIVE"
id = "91cecf65fad243c6836231e95b992855"

[observability]
enabled = true

name: Deploy

on:
  push:
    branches: [main, staging]
    paths-ignore:
      - '**.md'
      - '.github/dependabot.yml'

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Cloudflare
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.3.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '25'

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run codegen && pnpm run build

      - name: Migrate staging database
        if: github.ref == 'refs/heads/staging'
        run: |
          node -e "
            const { Client } = require('pg');
            const c = new Client({ connectionString: process.env.DATABASE_URL });
            c.connect()
              .then(() => c.query('SELECT * FROM drizzle.__drizzle_migrations ORDER BY created_at DESC LIMIT 10'))
              .then(r => { console.log('Columns:', r.fields.map(f=>f.name)); console.log('Last 10 applied migrations:'); r.rows.forEach(row => console.log(' -', JSON.stringify(row))); })
              .catch(e => console.error('DB check error:', e.message))
              .finally(() => c.end());
          "
          pnpm exec drizzle-kit migrate 2>&1
          echo "Exit code: $?"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Migrate production database
        if: github.ref == 'refs/heads/main'
        run: pnpm exec drizzle-kit migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Deploy staging
        if: github.ref == 'refs/heads/staging'
        run: pnpm exec wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy production
        if: github.ref == 'refs/heads/main'
        run: pnpm exec wrangler deploy --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
